<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Grocery list illustration">
  <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0f2fe"/><stop offset="1" stop-color="#f8fafc"/></linearGradient></defs>
  <rect width="1600" height="900" fill="url(#g2)"/>
  <rect x="180" y="90" width="1240" height="720" rx="28" fill="#fff" stroke="#cbd5e1"/>
  <text x="240" y="180" font-family="Georgia, serif" font-size="52" fill="#0f172a">Consolidated Grocery List</text>
  <g font-family="Arial, sans-serif" font-size="30" fill="#334155">
